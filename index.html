<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rock Rush</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #14141c;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    touch-action: none;
    image-rendering: auto;
    box-shadow: 0 0 60px rgba(0,0,0,.6);
  }
  .rr-panel { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: min(320px, 86vw); background: #1b1e28; border: 2px solid #f7c948;
    border-radius: 14px; padding: 16px 18px; color: #fff;
    font: bold 16px Arial, sans-serif; z-index: 10;
    box-shadow: 0 10px 40px rgba(0,0,0,.6); }
  .rr-head { font-size: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .rr-x { background: none; border: none; color: #9aa2ab; font-size: 20px; cursor: pointer; padding: 2px 6px; }
  .rr-x:focus, .rr-btn:focus, #rrNameIn:focus { outline: 2px solid #74c0fc; }
  .rr-sub { font-weight: normal; color: #c4c9d4; font-size: 13px; margin-bottom: 10px; }
  .rr-list { max-height: 300px; overflow-y: auto; font-variant-numeric: tabular-nums; font-size: 15px; font-weight: normal; }
  .rr-entry { display: flex; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #262b36; }
  .rr-entry.me { color: #f7c948; font-weight: bold; }
  .rr-rank { color: #9aa2ab; min-width: 30px; }
  .rr-entry.me .rr-rank { color: #f7c948; }
  .rr-nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
  .rr-gap { text-align: center; color: #9aa2ab; padding: 2px 0; }
  .rr-btnrow { display: flex; gap: 10px; margin-top: 12px; }
  .rr-btn { flex: 1; background: #f7c948; border: none; border-radius: 8px; padding: 10px 0;
    font: bold 16px Arial, sans-serif; color: #3a2c00; cursor: pointer; }
  .rr-ghost { background: #2a2f3d; color: #c4c9d4; }
  #rrNameIn { width: 100%; box-sizing: border-box; background: #12141c; border: 1px solid #3a4150;
    border-radius: 8px; color: #fff; font: bold 18px Arial, sans-serif; padding: 10px;
    text-transform: uppercase; outline: none; }
</style>
</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<script>
(() => {
'use strict';

// ---------- constants ----------
const W = 480, H = 720;
const GROUND_Y = 630;
const SEG_H = 80;          // height of one rock segment
const ROCK_W = 150;        // width of the rock pillar
const ROCK_X = (W - ROCK_W) / 2;
const SPIKE_LEN = 82;      // how far crystals stick out
const VISIBLE_SEGS = 10;
const PLAYER_X_LEFT = 112;
const PLAYER_X_RIGHT = W - 112;
const BEST_KEY = 'rockrush_best';
const SKIN_KEY = 'rockrush_skin';
const GAME_URL = 'https://andrewlocke2001-debug.github.io/rock-rush/';
const LB_KEY = 'rockrush-lb-a21672e937b720f1';      // public leaderboard store (textdb.online)
const LB_READ = 'https://textdb.online/' + LB_KEY;
const LB_WRITE = 'https://textdb.online/update';
const NAME_KEY = 'rockrush_name';

// crystal palettes: [upper, lower, main], outline
const CRYSTAL_STYLES = {
  p: { fills: ['#c084fc', '#a855f7', '#d8b4fe'], line: '#4a2a6e' }, // static
  r: { fills: ['#f87171', '#ef4444', '#fca5a5'], line: '#7f1d1d' }, // slides up/down
  b: { fills: ['#60a5fa', '#3b82f6', '#93c5fd'], line: '#1e3a8a' }  // switches sides
};

// cosmetic miner skins, unlocked by best score
const SKINS = [
  { name: 'RUSTY',      unlock: 0,   shirt: '#e8792e', pants: '#3b4a8c', boots: '#5b4025', hat: '#f7c948', skinT: '#f2c092', beard: '#7a5230', pick: '#9aa2ab', handle: '#8a5a2b' },
  { name: 'PROSPECTOR', unlock: 15,  shirt: '#b08968', pants: '#6b4f2e', boots: '#3d2b1f', hat: '#8a5a2b', skinT: '#eab892', beard: '#d9d9d9', pick: '#9aa2ab', handle: '#5b4025' },
  { name: 'EMERALD',    unlock: 35,  shirt: '#34d399', pants: '#065f46', boots: '#3d2b1f', hat: '#10b981', skinT: '#f2c092', beard: '#3f6212', pick: '#a7f3d0', handle: '#065f46' },
  { name: 'FROST',      unlock: 60,  shirt: '#93c5fd', pants: '#1e3a8a', boots: '#334155', hat: '#e0f2fe', skinT: '#e8eef5', beard: '#ffffff', pick: '#bfdbfe', handle: '#334155' },
  { name: 'GOLDEN',     unlock: 90,  shirt: '#fbbf24', pants: '#92400e', boots: '#78350f', hat: '#fde68a', skinT: '#f2c092', beard: '#b45309', pick: '#fde047', handle: '#78350f' },
  { name: 'SHADOW',     unlock: 140, shirt: '#1f2430', pants: '#0b0e14', boots: '#05070a', hat: '#2d3748', skinT: '#4a5568', beard: '#111827', pick: '#6b7280', handle: '#111827' }
];
const SKIN_LOCKED = { shirt: '#262b36', pants: '#1c2029', boots: '#14171e', hat: '#2e3340', skinT: '#343a47', beard: '#20242e', pick: '#3a4150', handle: '#262b36' };

const BTN_SHARE = { x: W / 2 - 165, y: 430, w: 155, h: 46 };
const BTN_BOARD = { x: W / 2 + 10, y: 430, w: 155, h: 46 };

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// localStorage can be unavailable in some hosted contexts
const store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
};

// ---------- state ----------
let state = 'title';       // 'title' | 'play' | 'over'
let segments = [];         // bottom-first; {hazard: null | {side,type,spd,ph}, id}
let segId = 0;
let playerSide = -1;       // -1 left, +1 right
let score = 0;
let best = Number(store.get(BEST_KEY) || 0);
let timeLeft = 1;          // 0..1
let dropOffset = 0;        // pillar falling animation
let swingT = 999;          // ms since last swing
let deathT = 0;            // ms since death (animation only)
let deathAt = 0;           // wall-clock time of death, for the restart lockout
let deathCause = '';       // 'spike' | 'time'
let justUnlocked = '';     // skin name unlocked by the last run
let shareMsg = '';         // feedback after pressing share
let shareMsgT = 0;
let playerName = String(store.get(NAME_KEY) || '').slice(0, 12);
let lbMsg = '';            // e.g. "WORLD RANK #3" on the game-over screen
let askedNameThisSession = false;
let pendingScore = 0;      // score waiting on the name prompt
let shake = 0;
let chunks = [];           // flying chopped pieces
let particles = [];
let popups = [];
let lastTime = performance.now();
let elapsed = 0;           // total ms, for clouds + crystal motion

let skinEq = Math.min(SKINS.length - 1, Math.max(0, Number(store.get(SKIN_KEY) || 0)));
if (best < SKINS[skinEq].unlock) skinEq = 0;
let skinSel = skinEq;      // skin being browsed on the title screen

// ---------- audio (tiny synth, no assets) ----------
let actx = null;
function audio() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function sfxClink() {
  const a = audio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(900 + Math.random() * 300, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.08);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 0.1);
}
function sfxDeath() {
  const a = audio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.45);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 0.55);
}
function sfxUnlock() {
  const a = audio(); if (!a) return;
  const t = a.currentTime;
  [523, 659, 784].forEach((f, i) => {
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t + i * 0.09);
    g.gain.setValueAtTime(0.001, t + i * 0.09);
    g.gain.linearRampToValueAtTime(0.2, t + i * 0.09 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.25);
    o.connect(g).connect(a.destination);
    o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.3);
  });
}

// ---------- rng helpers (deterministic per segment for stable cracks) ----------
function segRand(id, n) {
  const x = Math.sin(id * 127.1 + n * 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ---------- hazards ----------
// p = static purple; r = red, slides up/down one segment; b = blue, switches sides
function mkHazard(side, allowBlue) {
  let type = 'p';
  if (allowBlue && score >= 25 && Math.random() < 0.18) type = 'b';
  else if (score >= 12 && Math.random() < 0.3) type = 'r';
  return {
    side, type,
    spd: type === 'r' ? 0.0035 + Math.random() * 0.001 : 0.003 + Math.random() * 0.0012,
    ph: Math.random() * Math.PI * 2
  };
}

// red: 0 = at its home row, 1 = fully risen into the row above
function redOsc(h) { return (Math.sin(elapsed * h.spd + h.ph) + 1) / 2; }
// blue: >= 0 means on its base side; magnitude is how far it's extended
function blueOsc(h) { return Math.cos(elapsed * h.spd + h.ph); }

function hazardRow(h, home) {
  return h.type === 'r' ? home + (redOsc(h) >= 0.5 ? 1 : 0) : home;
}
function hazardSide(h) {
  return h.type === 'b' ? (blueOsc(h) >= 0 ? h.side : -h.side) : h.side;
}

// tapping `side` right now walks you into a crystal at head height
function runIntoDeadly(side) {
  const h = segments[0].hazard;
  return !!h && hazardRow(h, 0) === 0 && hazardSide(h) === side;
}
// after the pillar drops, the next segment's crystal lands on you
function fallOnDeadly(side) {
  const h = segments[1] && segments[1].hazard;
  return !!h && hazardRow(h, 1) === 1 && hazardSide(h) === side;
}

function newSegment(prevHazard) {
  let hazard = null;
  const p = Math.min(0.62, 0.45 + score * 0.002);
  if (Math.random() < p) {
    if (prevHazard && prevHazard.type === 'b') {
      hazard = null; // side-switchers get empty neighbors so a dodge always exists
    } else if (prevHazard) {
      // adjacent hazards may only continue on the same side (opposite-side
      // adjacency is an unavoidable death), and never stack a blue on a chain
      hazard = Math.random() < 0.6 ? mkHazard(prevHazard.side, false) : null;
    } else {
      hazard = mkHazard(Math.random() < 0.5 ? -1 : 1, true);
    }
  }
  return { hazard, id: segId++ };
}

function reset() {
  segments = [];
  segId = 0;
  for (let i = 0; i < VISIBLE_SEGS; i++) {
    // keep the first few segments clear so the start is fair
    segments.push(i < 4 ? { hazard: null, id: segId++ } : newSegment(segments[i - 1].hazard));
  }
  playerSide = -1;
  score = 0;
  timeLeft = 1;
  dropOffset = 0;
  swingT = 999;
  deathT = 0;
  justUnlocked = '';
  shareMsg = '';
  shake = 0;
  chunks = [];
  particles = [];
  popups = [];
}

function die(cause) {
  state = 'over';
  deathCause = cause;
  deathT = 0;
  deathAt = performance.now();
  shake = 14;
  const prevBest = best;
  if (score > best) {
    best = score;
    store.set(BEST_KEY, String(best));
  }
  const fresh = SKINS.find(s => s.unlock > prevBest && s.unlock <= best && s.unlock > 0);
  if (fresh) { justUnlocked = fresh.name; sfxUnlock(); }
  sfxDeath();
  lbMsg = '';
  if (score > 0) {
    if (playerName) submitScore(score);
    else if (!askedNameThisSession) { askedNameThisSession = true; openNamePrompt(score); }
  }
}

function spawnChunk(hazard) {
  chunks.push({
    x: W / 2, y: GROUND_Y - SEG_H / 2,
    vx: -playerSide * (6.5 + Math.random() * 3),
    vy: -4 - Math.random() * 2,
    rot: 0,
    vr: -playerSide * (0.15 + Math.random() * 0.1),
    hazard,
    id: segId++, // fresh id just for crack pattern
    life: 0
  });
}

function spawnParticles(side) {
  const px = side === -1 ? ROCK_X : ROCK_X + ROCK_W;
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: px, y: GROUND_Y - SEG_H / 2 + (Math.random() - 0.5) * 40,
      vx: side * -1 * (1 + Math.random() * 4) + (Math.random() - 0.5) * 3,
      vy: -2 - Math.random() * 4,
      size: 2 + Math.random() * 4,
      life: 1,
      gray: 120 + Math.random() * 80 | 0
    });
  }
}

// ---------- input / core mechanic ----------
function tap(side) {
  audio();
  if (state === 'title') { skinSel = skinEq; reset(); state = 'play'; }
  else if (state === 'over') {
    if (performance.now() - deathAt < 700) return; // brief lockout so you don't skip the score screen
    reset(); state = 'play';
  }
  if (state !== 'play') return;

  playerSide = side;
  swingT = 0;

  if (runIntoDeadly(side)) { die('spike'); return; }
  const crushed = fallOnDeadly(side);

  // mine the bottom segment
  const removed = segments.shift();
  segments.push(newSegment(segments[segments.length - 1].hazard));
  spawnChunk(removed.hazard);
  spawnParticles(side);
  dropOffset = SEG_H;
  shake = Math.min(shake + 3, 6);
  score++;
  timeLeft = Math.min(1, timeLeft + 0.075);
  popups.push({ x: W / 2 + side * 110, y: GROUND_Y - SEG_H - 30, life: 1 });
  sfxClink();

  if (crushed) { die('spike'); return; }
}

function cycleSkin(dir) {
  skinSel = (skinSel + dir + SKINS.length) % SKINS.length;
  if (best >= SKINS[skinSel].unlock) {
    skinEq = skinSel;
    store.set(SKIN_KEY, String(skinEq));
  }
}

function shareScore() {
  const text = '⛏ I scored ' + score + ' in Rock Rush! Can you beat it? ' + GAME_URL;
  shareMsgT = performance.now();
  if (navigator.share) {
    navigator.share({ text }).then(() => { shareMsg = 'SHARED!'; }).catch(() => {});
    shareMsg = '';
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => { shareMsg = 'COPIED TO CLIPBOARD!'; })
      .catch(() => { shareMsg = 'COPY FAILED'; });
    shareMsg = 'COPIED TO CLIPBOARD!';
  } else {
    shareMsg = 'COPY FAILED';
  }
}

// ---------- public leaderboard (shared JSON on textdb.online) ----------
function sanitizeName(raw) {
  return String(raw || '').replace(/[^\w \-!?.]/g, '').trim().slice(0, 12).toUpperCase();
}
async function lbLoad() {
  const r = await fetch(LB_READ + '?t=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('lb read ' + r.status);
  let j = null;
  try { j = JSON.parse(await r.text()); } catch (err) {}
  const list = j && Array.isArray(j.scores) ? j.scores : [];
  return list
    .filter(e => e && typeof e.n === 'string' && typeof e.s === 'number' && e.s > 0 && e.s < 1e6)
    .map(e => ({ n: sanitizeName(e.n) || '???', s: Math.floor(e.s), t: e.t || 0 }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 50);
}
async function lbSubmit(name, sc) {
  let list = [];
  try { list = await lbLoad(); } catch (err) {} // still record the score if the read fails
  const i = list.findIndex(e => e.n === name);
  if (i >= 0) { if (sc > list[i].s) list[i] = { n: name, s: sc, t: Date.now() }; }
  else list.push({ n: name, s: sc, t: Date.now() });
  list.sort((a, b) => b.s - a.s);
  list = list.slice(0, 50);
  const body = new URLSearchParams({ key: LB_KEY, value: JSON.stringify({ v: 1, scores: list }) });
  const r = await fetch(LB_WRITE, { method: 'POST', body });
  if (!r.ok) throw new Error('lb write ' + r.status);
  return list.findIndex(e => e.n === name) + 1;
}
function submitScore(sc) {
  lbSubmit(playerName, sc)
    .then(rank => { if (rank > 0) lbMsg = 'WORLD RANK #' + rank; })
    .catch(() => { lbMsg = ''; });
}

// ---------- DOM overlays (name prompt + rankings panel) ----------
const uiRoot = document.createElement('div');
uiRoot.innerHTML =
  '<div id="rrBoard" class="rr-panel" hidden>' +
    '<div class="rr-head">🏆 TOP MINERS <button class="rr-x" id="rrBoardX">✕</button></div>' +
    '<div id="rrList" class="rr-list">Loading…</div>' +
  '</div>' +
  '<div id="rrName" class="rr-panel" hidden>' +
    '<div class="rr-head">JOIN THE LEADERBOARD</div>' +
    '<div class="rr-sub">Pick a public miner name (max 12 chars)</div>' +
    '<input id="rrNameIn" maxlength="12" autocomplete="off" spellcheck="false" placeholder="YOUR NAME">' +
    '<div class="rr-btnrow"><button id="rrNameOk" class="rr-btn">SAVE</button><button id="rrNameSkip" class="rr-btn rr-ghost">SKIP</button></div>' +
  '</div>';
document.body.appendChild(uiRoot);
const boardEl = uiRoot.querySelector('#rrBoard');
const listEl = uiRoot.querySelector('#rrList');
const nameEl = uiRoot.querySelector('#rrName');
const nameIn = uiRoot.querySelector('#rrNameIn');

function overlayOpen() { return !boardEl.hidden || !nameEl.hidden; }
function closeOverlays() { boardEl.hidden = true; nameEl.hidden = true; }

function renderBoard(list) {
  if (!list.length) { listEl.textContent = 'No scores yet — be the first!'; return; }
  listEl.innerHTML = '';
  const row = (rank, e) => {
    const d = document.createElement('div');
    d.className = 'rr-entry' + (playerName && e.n === playerName ? ' me' : '');
    d.innerHTML = '<span class="rr-rank">' + rank + '.</span><span class="rr-nm"></span><span class="rr-sc">' + e.s + '</span>';
    d.querySelector('.rr-nm').textContent = e.n; // names are user data — never innerHTML
    listEl.appendChild(d);
  };
  list.slice(0, 10).forEach((e, i) => row(i + 1, e));
  if (playerName) {
    const mine = list.findIndex(e => e.n === playerName);
    if (mine >= 10) {
      const gap = document.createElement('div');
      gap.className = 'rr-gap'; gap.textContent = '⋯';
      listEl.appendChild(gap);
      row(mine + 1, list[mine]);
    }
  }
}
function openBoard() {
  nameEl.hidden = true;
  boardEl.hidden = false;
  listEl.textContent = 'Loading…';
  lbLoad().then(renderBoard).catch(() => { listEl.textContent = "Couldn't load — check back later."; });
}
function openNamePrompt(sc) {
  pendingScore = sc;
  boardEl.hidden = true;
  nameEl.hidden = false;
  nameIn.value = playerName;
  setTimeout(() => nameIn.focus(), 50);
}
uiRoot.querySelector('#rrBoardX').addEventListener('click', closeOverlays);
uiRoot.querySelector('#rrNameOk').addEventListener('click', () => {
  const nm = sanitizeName(nameIn.value);
  if (!nm) { nameIn.focus(); return; }
  playerName = nm;
  store.set(NAME_KEY, playerName);
  nameEl.hidden = true;
  if (pendingScore > 0) submitScore(pendingScore);
});
uiRoot.querySelector('#rrNameSkip').addEventListener('click', () => { nameEl.hidden = true; });
nameIn.addEventListener('keydown', (e) => {
  e.stopPropagation(); // typing a name must not swing the pickaxe
  if (e.key === 'Enter') uiRoot.querySelector('#rrNameOk').click();
});

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (overlayOpen()) { if (e.key === 'Escape') closeOverlays(); return; }
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); tap(-1); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); tap(1); }
  else if (state === 'title' && (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) { e.preventDefault(); cycleSkin(-1); }
  else if (state === 'title' && (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S')) { e.preventDefault(); cycleSkin(1); }
});
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (overlayOpen()) { closeOverlays(); return; }
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  const y = (e.clientY - rect.top) / rect.height * H;
  const inBtn = (b) => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
  if (state === 'over' && performance.now() - deathAt > 350) {
    if (inBtn(BTN_SHARE)) { shareScore(); return; }
    if (inBtn(BTN_BOARD)) { openBoard(); return; }
  }
  if (state === 'title' && y > 492 && y < 530) { openBoard(); return; }
  if (state === 'title' && y > 540) { cycleSkin(x < W / 2 ? -1 : 1); return; }
  tap(x < W / 2 ? -1 : 1);
});

// ---------- update ----------
function update(dt) {
  elapsed += dt;
  swingT += dt;
  if (state === 'over') deathT += dt;

  if (state === 'play') {
    const drain = 0.12 + Math.min(0.22, score * 0.0015);
    timeLeft -= drain * dt / 1000;
    if (timeLeft <= 0) { timeLeft = 0; die('time'); }
  }

  dropOffset = Math.max(0, dropOffset - dt * 0.9);
  shake = Math.max(0, shake - dt * 0.03);

  for (const c of chunks) {
    c.x += c.vx; c.y += c.vy; c.vy += 0.35; c.rot += c.vr; c.life += dt;
  }
  chunks = chunks.filter(c => c.y < H + 200);

  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= dt / 600;
  }
  particles = particles.filter(p => p.life > 0);

  for (const p of popups) { p.y -= dt * 0.05; p.life -= dt / 700; }
  popups = popups.filter(p => p.life > 0);
}

// ---------- drawing ----------
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#7ecbf2');
  g.addColorStop(1, '#d9f1fb');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // sun
  ctx.fillStyle = '#ffe9a3';
  ctx.beginPath(); ctx.arc(400, 90, 38, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff3c9';
  ctx.beginPath(); ctx.arc(400, 90, 28, 0, Math.PI * 2); ctx.fill();

  // drifting clouds
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  for (let i = 0; i < 3; i++) {
    const cx = ((elapsed * 0.008 * (0.5 + i * 0.3) + i * 210) % (W + 160)) - 80;
    const cy = 70 + i * 55;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 42, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - 28, cy + 6, 26, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 30, cy + 7, 28, 13, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // distant mountains
  ctx.fillStyle = '#a8bfc9';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(60, GROUND_Y - 130); ctx.lineTo(140, GROUND_Y);
  ctx.lineTo(200, GROUND_Y - 90); ctx.lineTo(280, GROUND_Y);
  ctx.lineTo(380, GROUND_Y - 150); ctx.lineTo(480, GROUND_Y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c3d5dd';
  ctx.beginPath();
  ctx.moveTo(100, GROUND_Y);
  ctx.lineTo(230, GROUND_Y - 110); ctx.lineTo(360, GROUND_Y);
  ctx.closePath(); ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#7ac74f';
  ctx.fillRect(0, GROUND_Y, W, 26);
  ctx.fillStyle = '#8a6f4d';
  ctx.fillRect(0, GROUND_Y + 26, W, H - GROUND_Y - 26);
  ctx.fillStyle = '#6da945';
  for (let i = 0; i < 12; i++) {
    ctx.fillRect(i * 44 + 10, GROUND_Y, 18, 6);
  }
}

function drawCrystals(x, y, dir, type, ext = 1) {
  // cluster of crystals sticking out horizontally from (x, y) toward dir;
  // ext squashes the cluster as blue crystals retract through the rock
  const st = CRYSTAL_STYLES[type] || CRYSTAL_STYLES.p;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir * Math.max(0.18, ext), 1);
  const draw = (len, w, oy, fill) => {
    ctx.fillStyle = fill;
    ctx.strokeStyle = st.line;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, oy - w);
    ctx.lineTo(len, oy);
    ctx.lineTo(0, oy + w);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(4, oy - w * 0.55);
    ctx.lineTo(len * 0.8, oy - w * 0.08);
    ctx.lineTo(len * 0.45, oy);
    ctx.closePath();
    ctx.fill();
  };
  draw(SPIKE_LEN * 0.6, 12, -16, st.fills[0]);
  draw(SPIKE_LEN * 0.65, 12, 16, st.fills[1]);
  draw(SPIKE_LEN, 15, 0, st.fills[2]);
  ctx.restore();
}

function drawHazard(h, yy, frozen) {
  // yy = top of the hazard's home segment; frozen = draw without motion (chunks)
  let cy = yy + SEG_H / 2;
  let side = h.side;
  let ext = 1;
  if (!frozen) {
    if (h.type === 'r') cy -= redOsc(h) * SEG_H;
    if (h.type === 'b') { const o = blueOsc(h); side = o >= 0 ? h.side : -h.side; ext = Math.abs(o); }
  }
  const x = side === -1 ? ROCK_X + 2 : ROCK_X + ROCK_W - 2;
  drawCrystals(x, cy, side, h.type, ext);
}

function drawSegmentBody(id, x, y, w, h) {
  const shade = 150 + segRand(id, 0) * 40 | 0;
  ctx.fillStyle = `rgb(${shade},${shade - 8},${shade - 14})`;
  ctx.strokeStyle = '#5c5650';
  ctx.lineWidth = 3;
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // cracks + speckles, deterministic per segment
  ctx.strokeStyle = 'rgba(70,64,58,0.55)';
  ctx.lineWidth = 2;
  for (let c = 0; c < 2; c++) {
    const cx = x + 15 + segRand(id, c + 1) * (w - 30);
    const cy = y + 10 + segRand(id, c + 4) * (h - 20);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 10 + segRand(id, c + 7) * 14, cy + 6 + segRand(id, c + 9) * 10);
    ctx.lineTo(cx + 4, cy + 16 + segRand(id, c + 11) * 8);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(90,84,76,0.5)';
  for (let s = 0; s < 4; s++) {
    ctx.fillRect(
      x + 8 + segRand(id, s + 20) * (w - 16),
      y + 6 + segRand(id, s + 30) * (h - 12),
      3, 3
    );
  }
}

function drawPillar() {
  // base boulder
  ctx.fillStyle = '#6e675f';
  ctx.strokeStyle = '#4c463f';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(W / 2, GROUND_Y + 8, ROCK_W / 2 + 24, 22, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // rock bodies first, then crystals on top so risers overlap cleanly
  for (let i = 0; i < segments.length; i++) {
    const yy = GROUND_Y - SEG_H * (i + 1) + dropOffset;
    if (yy > H || yy + SEG_H < -SEG_H) continue;
    drawSegmentBody(segments[i].id, ROCK_X, yy, ROCK_W, SEG_H);
  }
  for (let i = 0; i < segments.length; i++) {
    const yy = GROUND_Y - SEG_H * (i + 1) + dropOffset;
    if (yy > H || yy + SEG_H < -SEG_H) continue;
    if (segments[i].hazard) drawHazard(segments[i].hazard, yy, false);
  }
}

function drawChunks() {
  for (const c of chunks) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    drawSegmentBody(c.id, -ROCK_W / 2, -SEG_H / 2, ROCK_W, SEG_H);
    if (c.hazard) {
      const x = c.hazard.side === -1 ? -ROCK_W / 2 + 2 : ROCK_W / 2 - 2;
      drawCrystals(x, 0, c.hazard.side, c.hazard.type, 1);
    }
    ctx.restore();
  }
}

function drawPickaxe(swing, sk) {
  // held pointing up-back at rest, swings toward the rock
  ctx.save();
  ctx.translate(6, -46); // shoulder pivot
  ctx.rotate(-1.15 + swing * 1.55);
  // handle
  ctx.strokeStyle = sk.handle;
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(52, -6); ctx.stroke();
  // pick head
  ctx.strokeStyle = sk.pick;
  ctx.lineWidth = 9;
  ctx.beginPath();
  ctx.moveTo(44, -26);
  ctx.quadraticCurveTo(64, -8, 46, 16);
  ctx.stroke();
  ctx.restore();
}

function drawMiner(x, dead, sk) {
  ctx.save();
  ctx.translate(x, GROUND_Y);
  ctx.scale(playerSide === -1 ? 1 : -1, 1); // always face the pillar
  if (dead) {
    ctx.rotate(-Math.PI / 2 * Math.min(1, deathT / 250));
    ctx.translate(0, Math.min(14, deathT * 0.06));
  }

  // swing progress 0..1..0 over ~170ms
  const sp = swingT < 170 ? Math.sin((swingT / 170) * Math.PI) : 0;

  // legs
  ctx.fillStyle = sk.pants;
  ctx.fillRect(-14, -26, 11, 26);
  ctx.fillRect(3, -26, 11, 26);
  ctx.fillStyle = sk.boots;
  ctx.fillRect(-16, -7, 15, 7);
  ctx.fillRect(1, -7, 15, 7);
  // torso
  ctx.fillStyle = sk.shirt;
  ctx.fillRect(-15, -56, 30, 31);
  ctx.fillStyle = sk.pants;
  ctx.fillRect(-15, -44, 30, 19);
  ctx.fillRect(-13, -56, 7, 14);
  ctx.fillRect(6, -56, 7, 14);
  // head
  ctx.fillStyle = sk.skinT;
  ctx.beginPath(); ctx.arc(2, -66, 12, 0, Math.PI * 2); ctx.fill();
  // beard
  ctx.fillStyle = sk.beard;
  ctx.beginPath(); ctx.arc(4, -61, 9, -0.4, Math.PI - 0.6); ctx.fill();
  // eye
  ctx.fillStyle = '#222';
  ctx.fillRect(7, -70, 3, 3);
  // hard hat + lamp
  ctx.fillStyle = sk.hat;
  ctx.beginPath(); ctx.arc(2, -70, 13, Math.PI, 0); ctx.fill();
  ctx.fillRect(-13, -71, 30, 4);
  ctx.fillStyle = '#fffbe6';
  ctx.fillRect(9, -80, 6, 6);

  // pickaxe + arm
  drawPickaxe(sp, sk);
  ctx.strokeStyle = sk.shirt;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(4, -46);
  const ax = 16 + sp * 10, ay = -52 + sp * 14;
  ctx.lineTo(ax, ay);
  ctx.stroke();
  ctx.fillStyle = sk.skinT;
  ctx.beginPath(); ctx.arc(ax, ay, 5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = `rgb(${p.gray},${p.gray - 6},${p.gray - 12})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawPopups() {
  for (const p of popups) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 4;
    ctx.font = 'bold 26px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText('+1', p.x, p.y);
    ctx.fillText('+1', p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawHud() {
  // score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 8;
  ctx.font = 'bold 58px Arial, sans-serif';
  ctx.strokeText(String(score), W / 2, 66);
  ctx.fillText(String(score), W / 2, 66);

  // timer bar
  const bw = 220, bh = 18, bx = (W - bw) / 2, by = 84;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(bx - 3, by - 3, bw + 6, bh + 6, 9);
  ctx.fill();
  const t = Math.max(0, timeLeft);
  const hue = t * 110; // green -> red
  ctx.fillStyle = `hsl(${hue}, 75%, 50%)`;
  if (t > 0.005) { roundRect(bx, by, bw * t, bh, 7); ctx.fill(); }
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function outlined(text, x, y, fill, lw) {
  ctx.fillStyle = fill;
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = lw;
  ctx.strokeText(text, x, y);
  ctx.fillText(text, x, y);
}

function drawTitle() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 64px Arial, sans-serif';
  outlined('ROCK RUSH', W / 2, 180, '#fff', 10);

  ctx.font = 'bold 21px Arial, sans-serif';
  const lines = [
    'Tap LEFT / RIGHT sides of the screen',
    'or use  ←  →  keys to mine.',
    'Purple crystals sit still. Red ones climb.',
    'Blue ones switch sides. Dodge them all!'
  ];
  lines.forEach((l, i) => outlined(l, W / 2, 244 + i * 32, '#fff', 6));

  if (best > 0) {
    ctx.font = 'bold 26px Arial, sans-serif';
    outlined('BEST: ' + best, W / 2, 408, '#fff', 6);
  }

  if (Math.floor(elapsed / 500) % 2 === 0) {
    ctx.font = 'bold 30px Arial, sans-serif';
    outlined('TAP TO START', W / 2, 470, '#fff', 6);
  }

  ctx.font = 'bold 24px Arial, sans-serif';
  outlined('🏆 LEADERBOARD', W / 2, 514, '#ffd43b', 6);

  // skin selector
  const s = SKINS[skinSel];
  const locked = best < s.unlock;
  ctx.font = 'bold 28px Arial, sans-serif';
  outlined('◀', W / 2 - 130, 584, '#fff', 6);
  outlined('▶', W / 2 + 130, 584, '#fff', 6);
  outlined(s.name, W / 2, 584, locked ? '#9aa2ab' : '#f7c948', 6);
  ctx.font = 'bold 17px Arial, sans-serif';
  outlined(locked ? '🔒 UNLOCKS AT BEST ' + s.unlock : 'YOUR MINER  (▲▼ or tap below to change)',
    W / 2, 612, locked ? '#ff8787' : '#d0d4da', 5);
}

function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.5, deathT / 800)})`;
  ctx.fillRect(0, 0, W, H);
  if (deathT < 350) return;
  ctx.textAlign = 'center';
  ctx.font = 'bold 58px Arial, sans-serif';
  outlined('GAME OVER', W / 2, 220, '#ff5a5a', 10);

  ctx.font = 'bold 26px Arial, sans-serif';
  const cause = deathCause === 'time' ? "Time's up!" : 'Crushed by crystals!';
  outlined(cause, W / 2, 268, '#fff', 6);

  ctx.font = 'bold 34px Arial, sans-serif';
  outlined('SCORE: ' + score, W / 2, 312, '#fff', 6);
  outlined('BEST: ' + best, W / 2, 350, '#fff', 6);

  if (lbMsg) {
    ctx.font = 'bold 24px Arial, sans-serif';
    outlined(lbMsg, W / 2, 386, '#8ce99a', 6);
  }
  if (justUnlocked) {
    ctx.font = 'bold 22px Arial, sans-serif';
    outlined('★ NEW MINER UNLOCKED: ' + justUnlocked + ' ★', W / 2, 414, '#f7c948', 6);
  }

  // share + rankings buttons
  const btn = (b, fill, text, textFill) => {
    ctx.fillStyle = fill;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 3;
    roundRect(b.x, b.y, b.w, b.h, 12);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = textFill;
    ctx.font = 'bold 22px Arial, sans-serif';
    ctx.fillText(text, b.x + b.w / 2, b.y + 31);
  };
  btn(BTN_SHARE, '#f7c948', 'SHARE', '#3a2c00');
  btn(BTN_BOARD, '#74c0fc', 'RANKINGS', '#0b2a4a');

  if (shareMsg && performance.now() - shareMsgT < 2000) {
    ctx.font = 'bold 18px Arial, sans-serif';
    outlined(shareMsg, W / 2, 502, '#8ce99a', 5);
  }

  if (deathT > 700 && Math.floor(elapsed / 500) % 2 === 0) {
    ctx.font = 'bold 28px Arial, sans-serif';
    outlined('TAP TO TRY AGAIN', W / 2, 545, '#fff', 6);
  }
}

function draw() {
  ctx.save();
  if (shake > 0.5) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }
  drawSky();
  drawGround();
  drawPillar();
  drawChunks();
  const sk = state === 'title'
    ? (best >= SKINS[skinSel].unlock ? SKINS[skinSel] : SKIN_LOCKED)
    : SKINS[skinEq];
  drawMiner(playerSide === -1 ? PLAYER_X_LEFT : PLAYER_X_RIGHT, state === 'over' && deathCause === 'spike', sk);
  drawParticles();
  drawPopups();
  ctx.restore();

  if (state === 'title') drawTitle();
  else if (state === 'over') drawGameOver();
  if (state !== 'title') drawHud();
}

// ---------- main loop ----------
function frame(now) {
  const dt = Math.min(50, now - lastTime);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

// ---------- fit canvas to window ----------
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s | 0) + 'px';
  canvas.style.height = (H * s | 0) + 'px';
}
window.addEventListener('resize', fit);

// debug/testing hook
window.__rr = {
  tap,
  cycleSkin,
  shareScore,
  runIntoDeadly,
  fallOnDeadly,
  get state() { return state; },
  get score() { return score; },
  get best() { return best; },
  get timeLeft() { return timeLeft; },
  get segments() { return segments.map(s => s.hazard ? { side: s.hazard.side, type: s.hazard.type } : 0); },
  get playerSide() { return playerSide; },
  get skinEq() { return skinEq; },
  get skinSel() { return skinSel; },
  get justUnlocked() { return justUnlocked; },
  get shareMsg() { return shareMsg; },
  lbLoad,
  lbSubmit,
  openBoard,
  openNamePrompt,
  get lbMsg() { return lbMsg; },
  get playerName() { return playerName; },
  setName(v) { playerName = sanitizeName(v); store.set(NAME_KEY, playerName); },
  get elapsed() { return elapsed; },
  tick: (ms) => update(ms),
  draw
};

reset();
fit();
draw(); // paint immediately, before the first rAF tick
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
