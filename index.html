<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rock Rush</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #14141c;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    touch-action: none;
    image-rendering: auto;
    box-shadow: 0 0 60px rgba(0,0,0,.6);
  }
</style>
</head>
<body>
<canvas id="game" width="480" height="720"></canvas>
<script>
(() => {
'use strict';

// ---------- constants ----------
const W = 480, H = 720;
const GROUND_Y = 630;
const SEG_H = 80;          // height of one rock segment
const ROCK_W = 150;        // width of the rock pillar
const ROCK_X = (W - ROCK_W) / 2;
const SPIKE_LEN = 82;      // how far crystals stick out
const VISIBLE_SEGS = 10;
const PLAYER_X_LEFT = 112;
const PLAYER_X_RIGHT = W - 112;
const BEST_KEY = 'rockrush_best';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---------- state ----------
let state = 'title';       // 'title' | 'play' | 'over'
let segments = [];         // bottom-first; {hazard: -1|0|1, id}
let segId = 0;
let playerSide = -1;       // -1 left, +1 right
let score = 0;
// localStorage can be unavailable in some hosted contexts
const store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
};
let best = Number(store.get(BEST_KEY) || 0);
let timeLeft = 1;          // 0..1
let dropOffset = 0;        // pillar falling animation
let swingT = 999;          // ms since last swing
let deathT = 0;            // ms since death (animation only)
let deathAt = 0;           // wall-clock time of death, for the restart lockout
let deathCause = '';       // 'spike' | 'time'
let shake = 0;
let chunks = [];           // flying chopped pieces
let particles = [];
let popups = [];
let lastTime = performance.now();
let elapsed = 0;           // total ms, for clouds etc.

// ---------- audio (tiny synth, no assets) ----------
let actx = null;
function audio() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function sfxClink() {
  const a = audio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(900 + Math.random() * 300, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.08);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 0.1);
}
function sfxDeath() {
  const a = audio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.45);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 0.55);
}

// ---------- rng helpers (deterministic per segment for stable cracks) ----------
function segRand(id, n) {
  const x = Math.sin(id * 127.1 + n * 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// ---------- game setup ----------
function newSegment(prevHazard) {
  let hazard = 0;
  const p = Math.min(0.62, 0.45 + score * 0.002);
  if (Math.random() < p) {
    if (prevHazard !== 0) {
      // a crystal directly above one on the opposite side is an unavoidable
      // death, so adjacent hazards may only continue on the same side
      hazard = Math.random() < 0.6 ? prevHazard : 0;
    } else {
      hazard = Math.random() < 0.5 ? -1 : 1;
    }
  }
  return { hazard, id: segId++ };
}

function reset() {
  segments = [];
  segId = 0;
  for (let i = 0; i < VISIBLE_SEGS; i++) {
    // keep the first few segments clear so the start is fair
    segments.push(i < 4 ? { hazard: 0, id: segId++ } : newSegment(segments[i - 1].hazard));
  }
  playerSide = -1;
  score = 0;
  timeLeft = 1;
  dropOffset = 0;
  swingT = 999;
  deathT = 0;
  shake = 0;
  chunks = [];
  particles = [];
  popups = [];
}

function die(cause) {
  state = 'over';
  deathCause = cause;
  deathT = 0;
  deathAt = performance.now();
  shake = 14;
  if (score > best) {
    best = score;
    store.set(BEST_KEY, String(best));
  }
  sfxDeath();
}

function spawnChunk(hazard) {
  chunks.push({
    x: W / 2, y: GROUND_Y - SEG_H / 2,
    vx: -playerSide * (6.5 + Math.random() * 3),
    vy: -4 - Math.random() * 2,
    rot: 0,
    vr: -playerSide * (0.15 + Math.random() * 0.1),
    hazard,
    id: segId++, // fresh id just for crack pattern
    life: 0
  });
}

function spawnParticles(side) {
  const px = side === -1 ? ROCK_X : ROCK_X + ROCK_W;
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: px, y: GROUND_Y - SEG_H / 2 + (Math.random() - 0.5) * 40,
      vx: side * -1 * (1 + Math.random() * 4) + (Math.random() - 0.5) * 3,
      vy: -2 - Math.random() * 4,
      size: 2 + Math.random() * 4,
      life: 1,
      gray: 120 + Math.random() * 80 | 0
    });
  }
}

// ---------- input / core mechanic ----------
function tap(side) {
  audio();
  if (state === 'title') { reset(); state = 'play'; }
  else if (state === 'over') {
    if (performance.now() - deathAt < 700) return; // brief lockout so you don't skip the score screen
    reset(); state = 'play';
  }
  if (state !== 'play') return;

  playerSide = side;
  swingT = 0;

  // ran straight into a crystal at head height
  if (segments[0].hazard === side) { die('spike'); return; }

  // mine the bottom segment
  const removed = segments.shift();
  segments.push(newSegment(segments[segments.length - 1].hazard));
  spawnChunk(removed.hazard);
  spawnParticles(side);
  dropOffset = SEG_H;
  shake = Math.min(shake + 3, 6);
  score++;
  timeLeft = Math.min(1, timeLeft + 0.075);
  popups.push({ x: W / 2 + side * 110, y: GROUND_Y - SEG_H - 30, life: 1 });
  sfxClink();

  // the pillar drops — a crystal lands on you
  if (segments[0].hazard === playerSide) { die('spike'); return; }
}

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); tap(-1); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); tap(1); }
});
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  tap(x < W / 2 ? -1 : 1);
});

// ---------- update ----------
function update(dt) {
  elapsed += dt;
  swingT += dt;
  if (state === 'over') deathT += dt;

  if (state === 'play') {
    const drain = 0.12 + Math.min(0.22, score * 0.0015);
    timeLeft -= drain * dt / 1000;
    if (timeLeft <= 0) { timeLeft = 0; die('time'); }
  }

  dropOffset = Math.max(0, dropOffset - dt * 0.9);
  shake = Math.max(0, shake - dt * 0.03);

  for (const c of chunks) {
    c.x += c.vx; c.y += c.vy; c.vy += 0.35; c.rot += c.vr; c.life += dt;
  }
  chunks = chunks.filter(c => c.y < H + 200);

  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= dt / 600;
  }
  particles = particles.filter(p => p.life > 0);

  for (const p of popups) { p.y -= dt * 0.05; p.life -= dt / 700; }
  popups = popups.filter(p => p.life > 0);
}

// ---------- drawing ----------
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#7ecbf2');
  g.addColorStop(1, '#d9f1fb');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // sun
  ctx.fillStyle = '#ffe9a3';
  ctx.beginPath(); ctx.arc(400, 90, 38, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff3c9';
  ctx.beginPath(); ctx.arc(400, 90, 28, 0, Math.PI * 2); ctx.fill();

  // drifting clouds
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  for (let i = 0; i < 3; i++) {
    const cx = ((elapsed * 0.008 * (0.5 + i * 0.3) + i * 210) % (W + 160)) - 80;
    const cy = 70 + i * 55;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 42, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - 28, cy + 6, 26, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 30, cy + 7, 28, 13, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // distant mountains
  ctx.fillStyle = '#a8bfc9';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(60, GROUND_Y - 130); ctx.lineTo(140, GROUND_Y);
  ctx.lineTo(200, GROUND_Y - 90); ctx.lineTo(280, GROUND_Y);
  ctx.lineTo(380, GROUND_Y - 150); ctx.lineTo(480, GROUND_Y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c3d5dd';
  ctx.beginPath();
  ctx.moveTo(100, GROUND_Y);
  ctx.lineTo(230, GROUND_Y - 110); ctx.lineTo(360, GROUND_Y);
  ctx.closePath(); ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#7ac74f';
  ctx.fillRect(0, GROUND_Y, W, 26);
  ctx.fillStyle = '#8a6f4d';
  ctx.fillRect(0, GROUND_Y + 26, W, H - GROUND_Y - 26);
  ctx.fillStyle = '#6da945';
  for (let i = 0; i < 12; i++) {
    ctx.fillRect(i * 44 + 10, GROUND_Y, 18, 6);
  }
}

function drawCrystals(x, y, dir, scale = 1) {
  // cluster of crystals sticking out horizontally from (x, y) toward dir
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir * scale, scale);
  const draw = (len, w, oy, fill) => {
    ctx.fillStyle = fill;
    ctx.strokeStyle = '#4a2a6e';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, oy - w);
    ctx.lineTo(len, oy);
    ctx.lineTo(0, oy + w);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(4, oy - w * 0.55);
    ctx.lineTo(len * 0.8, oy - w * 0.08);
    ctx.lineTo(len * 0.45, oy);
    ctx.closePath();
    ctx.fill();
  };
  draw(SPIKE_LEN * 0.6, 12, -16, '#c084fc');
  draw(SPIKE_LEN * 0.65, 12, 16, '#a855f7');
  draw(SPIKE_LEN, 15, 0, '#d8b4fe');
  ctx.restore();
}

function drawSegmentBody(id, x, y, w, h) {
  const shade = 150 + segRand(id, 0) * 40 | 0;
  ctx.fillStyle = `rgb(${shade},${shade - 8},${shade - 14})`;
  ctx.strokeStyle = '#5c5650';
  ctx.lineWidth = 3;
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // cracks + speckles, deterministic per segment
  ctx.strokeStyle = 'rgba(70,64,58,0.55)';
  ctx.lineWidth = 2;
  for (let c = 0; c < 2; c++) {
    const cx = x + 15 + segRand(id, c + 1) * (w - 30);
    const cy = y + 10 + segRand(id, c + 4) * (h - 20);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 10 + segRand(id, c + 7) * 14, cy + 6 + segRand(id, c + 9) * 10);
    ctx.lineTo(cx + 4, cy + 16 + segRand(id, c + 11) * 8);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(90,84,76,0.5)';
  for (let s = 0; s < 4; s++) {
    ctx.fillRect(
      x + 8 + segRand(id, s + 20) * (w - 16),
      y + 6 + segRand(id, s + 30) * (h - 12),
      3, 3
    );
  }
}

function drawPillar() {
  // base boulder
  ctx.fillStyle = '#6e675f';
  ctx.strokeStyle = '#4c463f';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(W / 2, GROUND_Y + 8, ROCK_W / 2 + 24, 22, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  for (let i = 0; i < segments.length; i++) {
    const y = GROUND_Y - SEG_H * (i + 1) - dropOffset * Math.min(1, i * 0.15 + 0.6);
    const yy = GROUND_Y - SEG_H * (i + 1) + dropOffset;
    if (yy > H || yy + SEG_H < -SEG_H) continue;
    drawSegmentBody(segments[i].id, ROCK_X, yy, ROCK_W, SEG_H);
    if (segments[i].hazard === -1) drawCrystals(ROCK_X + 2, yy + SEG_H / 2, -1);
    if (segments[i].hazard === 1) drawCrystals(ROCK_X + ROCK_W - 2, yy + SEG_H / 2, 1);
  }
}

function drawChunks() {
  for (const c of chunks) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    drawSegmentBody(c.id, -ROCK_W / 2, -SEG_H / 2, ROCK_W, SEG_H);
    if (c.hazard === -1) drawCrystals(-ROCK_W / 2 + 2, 0, -1);
    if (c.hazard === 1) drawCrystals(ROCK_W / 2 - 2, 0, 1);
    ctx.restore();
  }
}

function drawPickaxe(swing) {
  // held pointing up-back at rest, swings toward the rock
  ctx.save();
  ctx.translate(6, -46); // shoulder pivot
  ctx.rotate(-1.15 + swing * 1.55);
  // handle
  ctx.strokeStyle = '#8a5a2b';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(52, -6); ctx.stroke();
  // pick head
  ctx.strokeStyle = '#9aa2ab';
  ctx.lineWidth = 9;
  ctx.beginPath();
  ctx.moveTo(44, -26);
  ctx.quadraticCurveTo(64, -8, 46, 16);
  ctx.stroke();
  ctx.restore();
}

function drawMiner(x, dead) {
  ctx.save();
  ctx.translate(x, GROUND_Y);
  ctx.scale(playerSide === -1 ? 1 : -1, 1); // always face the pillar
  if (dead) {
    ctx.rotate(-Math.PI / 2 * Math.min(1, deathT / 250));
    ctx.translate(0, Math.min(14, deathT * 0.06));
  }

  // swing progress 0..1..0 over ~170ms
  const sp = swingT < 170 ? Math.sin((swingT / 170) * Math.PI) : 0;

  // legs
  ctx.fillStyle = '#3b4a8c';
  ctx.fillRect(-14, -26, 11, 26);
  ctx.fillRect(3, -26, 11, 26);
  ctx.fillStyle = '#5b4025';
  ctx.fillRect(-16, -7, 15, 7);
  ctx.fillRect(1, -7, 15, 7);
  // torso
  ctx.fillStyle = '#e8792e';
  ctx.fillRect(-15, -56, 30, 31);
  ctx.fillStyle = '#3b4a8c';
  ctx.fillRect(-15, -44, 30, 19);
  ctx.fillRect(-13, -56, 7, 14);
  ctx.fillRect(6, -56, 7, 14);
  // head
  ctx.fillStyle = '#f2c092';
  ctx.beginPath(); ctx.arc(2, -66, 12, 0, Math.PI * 2); ctx.fill();
  // beard
  ctx.fillStyle = '#7a5230';
  ctx.beginPath(); ctx.arc(4, -61, 9, -0.4, Math.PI - 0.6); ctx.fill();
  // eye
  ctx.fillStyle = '#222';
  ctx.fillRect(7, -70, 3, 3);
  // hard hat + lamp
  ctx.fillStyle = '#f7c948';
  ctx.beginPath(); ctx.arc(2, -70, 13, Math.PI, 0); ctx.fill();
  ctx.fillRect(-13, -71, 30, 4);
  ctx.fillStyle = '#fffbe6';
  ctx.fillRect(9, -80, 6, 6);

  // pickaxe + arm
  drawPickaxe(sp);
  ctx.strokeStyle = '#e8792e';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(4, -46);
  const ax = 16 + sp * 10, ay = -52 + sp * 14;
  ctx.lineTo(ax, ay);
  ctx.stroke();
  ctx.fillStyle = '#f2c092';
  ctx.beginPath(); ctx.arc(ax, ay, 5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = `rgb(${p.gray},${p.gray - 6},${p.gray - 12})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawPopups() {
  for (const p of popups) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 4;
    ctx.font = 'bold 26px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText('+1', p.x, p.y);
    ctx.fillText('+1', p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawHud() {
  // score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 8;
  ctx.font = 'bold 58px Arial, sans-serif';
  ctx.strokeText(String(score), W / 2, 66);
  ctx.fillText(String(score), W / 2, 66);

  // timer bar
  const bw = 220, bh = 18, bx = (W - bw) / 2, by = 84;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(bx - 3, by - 3, bw + 6, bh + 6, 9);
  ctx.fill();
  const t = Math.max(0, timeLeft);
  const hue = t * 110; // green -> red
  ctx.fillStyle = `hsl(${hue}, 75%, 50%)`;
  if (t > 0.005) { roundRect(bx, by, bw * t, bh, 7); ctx.fill(); }
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawTitle() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 10;
  ctx.font = 'bold 64px Arial, sans-serif';
  ctx.strokeText('ROCK RUSH', W / 2, 200);
  ctx.fillText('ROCK RUSH', W / 2, 200);

  ctx.font = 'bold 22px Arial, sans-serif';
  ctx.lineWidth = 6;
  const lines = [
    'Tap LEFT / RIGHT sides of the screen',
    'or use  ←  →  keys to mine.',
    'Dodge the crystals. Beat the clock!'
  ];
  lines.forEach((l, i) => {
    ctx.strokeText(l, W / 2, 268 + i * 34);
    ctx.fillText(l, W / 2, 268 + i * 34);
  });

  if (best > 0) {
    ctx.font = 'bold 26px Arial, sans-serif';
    ctx.strokeText('BEST: ' + best, W / 2, 404);
    ctx.fillText('BEST: ' + best, W / 2, 404);
  }

  if (Math.floor(elapsed / 500) % 2 === 0) {
    ctx.font = 'bold 30px Arial, sans-serif';
    ctx.strokeText('TAP TO START', W / 2, 480);
    ctx.fillText('TAP TO START', W / 2, 480);
  }
}

function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.5, deathT / 800)})`;
  ctx.fillRect(0, 0, W, H);
  if (deathT < 350) return;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff5a5a';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 10;
  ctx.font = 'bold 58px Arial, sans-serif';
  ctx.strokeText('GAME OVER', W / 2, 230);
  ctx.fillText('GAME OVER', W / 2, 230);

  ctx.fillStyle = '#fff';
  ctx.lineWidth = 6;
  ctx.font = 'bold 26px Arial, sans-serif';
  const cause = deathCause === 'time' ? "Time's up!" : 'Crushed by crystals!';
  ctx.strokeText(cause, W / 2, 280);
  ctx.fillText(cause, W / 2, 280);

  ctx.font = 'bold 34px Arial, sans-serif';
  ctx.strokeText('SCORE: ' + score, W / 2, 340);
  ctx.fillText('SCORE: ' + score, W / 2, 340);
  ctx.strokeText('BEST: ' + best, W / 2, 384);
  ctx.fillText('BEST: ' + best, W / 2, 384);

  if (deathT > 700 && Math.floor(elapsed / 500) % 2 === 0) {
    ctx.font = 'bold 28px Arial, sans-serif';
    ctx.strokeText('TAP TO TRY AGAIN', W / 2, 460);
    ctx.fillText('TAP TO TRY AGAIN', W / 2, 460);
  }
}

function draw() {
  ctx.save();
  if (shake > 0.5) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }
  drawSky();
  drawGround();
  drawPillar();
  drawChunks();
  drawMiner(playerSide === -1 ? PLAYER_X_LEFT : PLAYER_X_RIGHT, state === 'over' && deathCause === 'spike');
  drawParticles();
  drawPopups();
  ctx.restore();

  if (state === 'title') drawTitle();
  else if (state === 'over') drawGameOver();
  if (state !== 'title') drawHud();
}

// ---------- main loop ----------
function frame(now) {
  const dt = Math.min(50, now - lastTime);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

// ---------- fit canvas to window ----------
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s | 0) + 'px';
  canvas.style.height = (H * s | 0) + 'px';
}
window.addEventListener('resize', fit);

// debug/testing hook
window.__rr = {
  tap,
  get state() { return state; },
  get score() { return score; },
  get timeLeft() { return timeLeft; },
  get segments() { return segments.map(s => s.hazard); },
  get playerSide() { return playerSide; },
  get elapsed() { return elapsed; },
  tick: (ms) => update(ms),
  draw
};

reset();
fit();
draw(); // paint immediately, before the first rAF tick
requestAnimationFrame(frame);
})();
</script>
</body>
